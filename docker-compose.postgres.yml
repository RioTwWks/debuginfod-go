# PostgreSQL для интеграционных тестов и локальной разработки.
#
#   deploy/postgresql/docker-up.sh          # с подсказками по прокси
#   make postgres-test-up
#   make test-postgres
#
# Корпоративное зеркало образа:
#   export POSTGRES_IMAGE=registry.corp.local/library/postgres:16-alpine
#
# Без Docker (системный PostgreSQL):
#   sudo deploy/postgresql/setup-local-test-db.sh
#
# DEBUGINFOD_DATABASE_URL=postgres://debuginfod:debuginfod@127.0.0.1:5433/debuginfod?sslmode=disable

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: debuginfod
      POSTGRES_PASSWORD: debuginfod
      POSTGRES_DB: debuginfod
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debuginfod -d debuginfod"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - debuginfod-pg-test:/var/lib/postgresql/data

volumes:
  debuginfod-pg-test:
