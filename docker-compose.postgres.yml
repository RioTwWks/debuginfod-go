# PostgreSQL для интеграционных тестов и локальной разработки.
#
# Корпоративный прокси (как PVS-Studio-Tracker):
#   . deploy/docker/ensure-proxy-env.sh
#   deploy/docker/compose.sh -f docker-compose.postgres.yml up -d --build --wait
#   make test-postgres
#
# DEBUGINFOD_DATABASE_URL=postgres://debuginfod:debuginfod@127.0.0.1:5433/debuginfod?sslmode=disable

x-postgres-build: &postgres-build
  context: .
  dockerfile: deploy/postgresql/Dockerfile
  network: host
  args:
    HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
    HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
    NO_PROXY: ${NO_PROXY:-${no_proxy:-}}

services:
  postgres:
    build: *postgres-build
    image: debuginfod-postgres:16
    environment:
      POSTGRES_USER: debuginfod
      POSTGRES_PASSWORD: debuginfod
      POSTGRES_DB: debuginfod
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debuginfod -d debuginfod"]
      interval: 2s
      timeout: 5s
      retries: 15
    volumes:
      - debuginfod-pg-test:/var/lib/postgresql/data

volumes:
  debuginfod-pg-test:
