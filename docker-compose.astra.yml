# Overlay для Astra Linux 1.7: Debian buster runtime (glibc), как в PVS-Studio-Tracker.
#
# В контейнере — стандартные репозитории Debian (deb.debian.org) + HTTP_PROXY с хоста.
# НЕ используйте APT_PROFILE=astra без копирования GPG-ключей хоста (NO_PUBKEY).
#
#   make build
#   make docker-astra
#
# Явно Astra-репозитории (редко нужно):
#   export APT_PROFILE=astra
#   make docker-astra

services:
  debuginfod:
    build:
      network: host
      args:
        DEBIAN_SUITE: ${DEBIAN_SUITE:-buster}
        APT_PROFILE: ${APT_PROFILE:-}
        APT_MIRROR: ${APT_MIRROR:-}
        HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
        HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
        NO_PROXY: ${NO_PROXY:-${no_proxy:-}}
        APT_INSECURE: ${APT_INSECURE:-false}
