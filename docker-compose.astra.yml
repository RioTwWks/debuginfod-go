# Overlay для Astra Linux 1.7: buster runtime + репозитории download.astralinux.ru.
#
# deb.debian.org/buster — 404 (EOL, снят с main mirror). На Astra 1.7 нужны
# репозитории хоста + CA/GPG с хоста (prepare-build-certs.sh) + HTTP_PROXY.
#
#   make build
#   make docker-astra

services:
  debuginfod:
    build:
      network: host
      args:
        DEBIAN_SUITE: ${DEBIAN_SUITE:-buster}
        APT_PROFILE: ${APT_PROFILE:-astra}
        APT_MIRROR: ${APT_MIRROR:-}
        HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
        HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
        NO_PROXY: ${NO_PROXY:-${no_proxy:-}}
        APT_INSECURE: ${APT_INSECURE:-false}
