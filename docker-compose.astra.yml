# Overlay для Astra Linux 1.7: APT из download.astralinux.ru (не deb.debian.org).
#
#   make build
#   make docker-astra
#   # или:
#   docker compose -f docker-compose.yml -f docker-compose.prebuilt.yml -f docker-compose.astra.yml up --build
#
# Полная сборка с Go внутри контейнера (медленнее, нужен proxy.golang.org или vendor):
#   docker compose -f docker-compose.yml -f docker-compose.astra.yml up --build

services:
  debuginfod:
    build:
      network: host
      args:
        DEBIAN_SUITE: ${DEBIAN_SUITE:-buster}
        APT_PROFILE: ${APT_PROFILE:-astra}
        APT_MIRROR: ${APT_MIRROR:-}
        HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
        HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
        NO_PROXY: ${NO_PROXY:-${no_proxy:-}}
        APT_INSECURE: ${APT_INSECURE:-false}
