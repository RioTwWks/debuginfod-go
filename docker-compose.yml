# Локальный dev-запуск (Docker). Для production на Astra/Ubuntu — пакеты + systemd.
#
#   make -C examples/sample    # демо-бинарники для индексации
#   docker compose up --build
#
# Astra / без доступа к deb.debian.org:
#   make build
#   docker compose -f docker-compose.yml -f docker-compose.prebuilt.yml up --build
#   см. deploy/docker/README.md
#
# Хостовый /usr/lib/debug (опционально):
#   DEBUGINFOD_SCAN_PATH=/sample,/usr/lib/debug
#   volumes: - /usr/lib/debug:/usr/lib/debug:ro

services:
  debuginfod:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        DEBIAN_SUITE: ${DEBIAN_SUITE:-bookworm}
        APT_MIRROR: ${APT_MIRROR:-}
    ports:
      - "8002:8002"
    volumes:
      - debuginfod-data:/data
      - ./examples/sample/bin:/sample:ro
    environment:
      DEBUGINFOD_DB_PATH: /data/debuginfod.sqlite
      DEBUGINFOD_SCAN_PATH: /sample
      DEBUGINFOD_CACHE_DIR: /data/cache
      DEBUGINFOD_PORT: "8002"
      DEBUGINFOD_LOG_LEVEL: info
      DEBUGINFOD_UI_ENABLED: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8002/healthz"]
      interval: 5s
      timeout: 3s
      retries: 6
      start_period: 15s

volumes:
  debuginfod-data:
