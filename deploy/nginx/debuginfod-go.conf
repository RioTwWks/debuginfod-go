# debuginfod-go — reverse proxy (nginx)
#
# Установка (Debian/Ubuntu/Astra):
#   sudo apt install nginx
#   sudo cp debuginfod-go.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/debuginfod-go.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# RedOS/CentOS: путь sites-available → /etc/nginx/conf.d/debuginfod-go.conf
#
# TLS: замените пути к сертификатам или подключите Let's Encrypt (certbot).

limit_req_zone $binary_remote_addr zone=debuginfod_limit:10m rate=20r/s;

upstream debuginfod_backend {
    server 127.0.0.1:8002;
    keepalive 16;
}

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name debuginfod.example.com;

    location /healthz {
        proxy_pass http://debuginfod_backend;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name debuginfod.example.com;

    # TLS (замените на свои сертификаты)
    ssl_certificate     /etc/ssl/certs/debuginfod.crt;
    ssl_certificate_key /etc/ssl/private/debuginfod.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ACL: разрешить только внутренние сети (раскомментируйте и настройте)
    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny all;

    # Rate limiting
    limit_req zone=debuginfod_limit burst=40 nodelay;

    client_max_body_size 64m;

    location /healthz {
        proxy_pass http://debuginfod_backend;
        access_log off;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_pass http://debuginfod_backend;
    }
}
